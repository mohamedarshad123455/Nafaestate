<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAFA Blogs | Luxury Real Estate Updates</title>
    <style>
        :root { --gold: #c5a059; --dark: #1a1a1a; --gray: #f8f9fa; }
        body { font-family: 'Georgia', serif; margin: 0; background-color: var(--gray); color: var(--dark); overflow-x: hidden; }
        
        /* Fixed Admin Button in Top Right */
        .admin-link {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 10px 18px;
            background: rgba(255, 255, 255, 0.1);
            color: var(--gold);
            border: 1px solid var(--gold);
            text-decoration: none;
            font-family: sans-serif;
            font-size: 0.7rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            border-radius: 4px;
            transition: 0.3s;
            z-index: 100;
        }
        .admin-link:hover {
            background: var(--gold);
            color: white;
        }

        .header { text-align: center; padding: 120px 20px 100px; background: var(--dark); color: white; position: relative; }
        .header h1 { font-size: clamp(2rem, 8vw, 3rem); letter-spacing: 4px; margin: 0; text-transform: uppercase; }
        .header p { color: var(--gold); font-family: sans-serif; letter-spacing: 2px; margin-bottom: 10px; font-size: 0.8rem; }

        /* Fixed Grid and Spacing */
        .blog-container { 
            max-width: 1200px; 
            margin: -40px auto 100px; 
            padding: 0 20px; 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); 
            gap: 30px; 
        }
        
        .blog-card { 
            background: white; 
            border-radius: 8px; 
            overflow: hidden; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
            transition: 0.4s; 
            display: flex;
            flex-direction: column;
        }
        .blog-card:hover { transform: translateY(-10px); }
        
        /* IMAGE FIX: Wrapper ensures the image doesn't get cut off */
        .blog-img-wrapper {
            width: 100%;
            height: 250px;
            overflow: hidden;
            background-color: #eee;
        }
        
        .blog-img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; /* Keeps image proportions perfect */
            display: block;
        }

        .blog-content { padding: 30px; border-top: 4px solid var(--gold); flex-grow: 1; }
        .blog-date { color: #999; font-size: 0.8rem; font-family: sans-serif; }
        .blog-title { font-size: 1.5rem; margin: 15px 0; color: var(--dark); line-height: 1.2; font-weight: bold; }
        .blog-text { color: #666; font-size: 1rem; line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 20px; }
        
        .read-more { display: inline-block; color: var(--gold); text-decoration: none; font-weight: bold; font-family: sans-serif; font-size: 0.8rem; letter-spacing: 1px; transition: 0.3s; text-transform: uppercase; }
        .read-more:hover { letter-spacing: 2px; color: var(--dark); }
    </style>
</head>
<body>

    <div class="header">
        <a href="admin.html" class="admin-link">Admin Login</a>
        <p>EXPERTISE IN DUBAI REAL ESTATE</p>
        <h1>NAFA BLOGS</h1>
    </div>

    <div class="blog-container" id="blog-list">
        </div>

    <script>
        function loadPosts() {
            const container = document.getElementById('blog-list');
            const posts = JSON.parse(localStorage.getItem('nafa_blogs')) || [];

            if (posts.length === 0) {
                container.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 100px; color: #bbb;"><h2>No stories published yet.</h2></div>';
                return;
            }

            // Updated map to include the image wrapper
            container.innerHTML = posts.map((post, index) => `
                <div class="blog-card">
                    <div class="blog-img-wrapper">
                        <img src="${post.image}" class="blog-img" alt="${post.title}">
                    </div>
                    <div class="blog-content">
                        <span class="blog-date">${post.date}</span>
                        <h2 class="blog-title">${post.title}</h2>
                        <p class="blog-text">${post.content}</p>
                        <a href="post.html?id=${index}" class="read-more">CONTINUE READING →</a>
                    </div>
                </div>
            `).join('');
        }
        window.onload = loadPosts;
    </script>
</body>
</html>
