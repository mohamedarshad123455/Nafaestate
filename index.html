<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAFA Blogs | Luxury Real Estate</title>
    <style>
        :root { --gold: #c5a059; --dark: #1a1a1a; --gray: #f8f9fa; }
        body { font-family: 'Georgia', serif; margin: 0; background-color: var(--gray); color: var(--dark); }
        .header { text-align: center; padding: 80px 20px; background: var(--dark); color: white; }
        .header h1 { font-size: 3rem; letter-spacing: 4px; margin: 0; text-transform: uppercase; }
        .blog-container { max-width: 1200px; margin: 40px auto; padding: 0 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; }
        .blog-card { background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.05); display: flex; flex-direction: column; transition: 0.3s; text-decoration: none; color: inherit; }
        .blog-card:hover { transform: translateY(-5px); }
        .blog-img { width: 100%; height: 200px; object-fit: cover; }
        .blog-content { padding: 20px; flex-grow: 1; border-top: 4px solid var(--gold); }
        .blog-title { font-size: 1.4rem; margin: 10px 0; }
        .read-more { color: var(--gold); font-weight: bold; font-family: sans-serif; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="header">
        <h1>NAFA BLOGS</h1>
    </div>
    <div class="blog-container" id="blog-list"></div>

    <script>
        function loadPosts() {
            const container = document.getElementById('blog-list');
            const posts = JSON.parse(localStorage.getItem('nafa_blogs')) || [];

            if (posts.length === 0) {
                container.innerHTML = '<h2>No stories published yet.</h2>';
                return;
            }

            container.innerHTML = posts.map((post, index) => {
                // Supports both the old single image and new multiple images array
                const coverImg = (post.images && post.images.length > 0) ? post.images[0] : (post.image || '');
                
                return `
                    <a href="post.html?id=${index}" class="blog-card">
                        <img src="${coverImg}" class="blog-img">
                        <div class="blog-content">
                            <small>${post.date}</small>
                            <h2 class="blog-title">${post.title}</h2>
                            <span class="read-more">CONTINUE READING →</span>
                        </div>
                    </a>`;
            }).join('');
        }
        window.onload = loadPosts;
    </script>
</body>
</html>
