<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NAFA Admin | Post Editor</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 40px; }
        .editor { max-width: 800px; margin: auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        input, textarea { width: 100%; padding: 15px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { background: #1a1a1a; color: white; padding: 15px 30px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; }
        .preview-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; margin: 20px 0; }
        .preview-box { border: 2px solid #c5a059; border-radius: 4px; position: relative; height: 100px; }
        .preview-box img { width: 100%; height: 100%; object-fit: cover; }
        .tag { position: absolute; bottom: 0; background: rgba(0,0,0,0.7); color: #fff; font-size: 10px; width: 100%; text-align: center; }
    </style>
</head>
<body>
    <div class="editor">
        <h2>Create New Story</h2>
        <input type="text" id="title" placeholder="Blog Title">
        <input type="file" id="imageInput" multiple accept="image/*" onchange="handleFiles(this.files)">
        <div id="previewGrid" class="preview-grid"></div>
        <textarea id="content" rows="10" placeholder="Write content. Use [img1], [img2] to place your uploaded photos..."></textarea>
        <button onclick="publish()">PUBLISH TO WEBSITE</button>
    </div>

    <script>
        let imageArray = [];
        function handleFiles(files) {
            Array.from(files).forEach((file, index) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (e) => {
                    imageArray.push(e.target.result);
                    updatePreview();
                };
            });
        }
        function updatePreview() {
            const grid = document.getElementById('previewGrid');
            grid.innerHTML = imageArray.map((src, i) => `
                <div class="preview-box">
                    <img src="${src}">
                    <div class="tag">[img${i+1}]</div>
                </div>
            `).join('');
        }
        function publish() {
            const post = {
                title: document.getElementById('title').value,
                content: document.getElementById('content').value,
                images: imageArray,
                date: new Date().toLocaleDateString('en-GB')
            };
            const posts = JSON.parse(localStorage.getItem('nafa_blogs')) || [];
            posts.unshift(post);
            localStorage.setItem('nafa_blogs', JSON.stringify(posts));
            alert("Success! Your story is live.");
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
