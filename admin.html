<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NAFA Admin | Post Editor</title>
    <style>
        :root { --gold: #c5a059; --dark: #1a1a1a; }
        body { font-family: sans-serif; background: #f0f2f5; padding: 40px; margin: 0; }
        .editor-container { max-width: 900px; margin: auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        input, textarea { width: 100%; padding: 15px; margin: 10px 0 20px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { background: var(--dark); color: white; padding: 18px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; }
        button:hover { background: var(--gold); }
        .preview-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .img-card { position: relative; border: 2px solid #eee; height: 120px; }
        .img-card img { width: 100%; height: 100%; object-fit: cover; }
        .img-tag { position: absolute; top: 5px; left: 5px; background: var(--gold); color: white; padding: 2px 6px; font-size: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="editor-container">
        <h2>CREATE NEW STORY</h2>
        <input type="text" id="title" placeholder="Blog Title">
        <input type="file" id="imageInput" multiple accept="image/*" onchange="handleFiles(this.files)">
        <div id="previewGrid" class="preview-grid"></div>
        <textarea id="content" rows="15" placeholder="Use [img1], [img2] to place photos..."></textarea>
        <button onclick="publish()">PUBLISH STORY</button>
    </div>
    <script>
        let imgStore = [];
        function handleFiles(files) {
            Array.from(files).forEach((file) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (e) => {
                    imgStore.push(e.target.result);
                    renderPreviews();
                };
            });
        }
        function renderPreviews() {
            document.getElementById('previewGrid').innerHTML = imgStore.map((src, i) => `
                <div class="img-card"><img src="${src}"><span class="img-tag">[img${i+1}]</span></div>
            `).join('');
        }
        function publish() {
            const post = {
                title: document.getElementById('title').value,
                content: document.getElementById('content').value,
                images: imgStore,
                date: new Date().toLocaleDateString('en-GB')
            };
            const posts = JSON.parse(localStorage.getItem('nafa_blogs')) || [];
            posts.unshift(post);
            localStorage.setItem('nafa_blogs', JSON.stringify(posts));
            alert("Live!");
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
