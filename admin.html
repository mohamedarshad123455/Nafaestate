<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NAFA Admin</title>
    <style>
        body { font-family: sans-serif; padding: 40px; background: #f4f4f4; }
        .form-container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 8px; }
        input, textarea { width: 100%; margin-bottom: 20px; padding: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #1a1a1a; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>New Post</h2>
        <input type="text" id="title" placeholder="Title">
        <input type="file" id="images" multiple accept="image/*">
        <textarea id="content" rows="10" placeholder="Content"></textarea>
        <button onclick="savePost()">Publish</button>
    </div>

    <script>
        async function savePost() {
            const files = document.getElementById('images').files;
            const images = await Promise.all(Array.from(files).map(file => {
                return new Promise(resolve => {
                    const reader = new FileReader();
                    reader.onload = e => resolve(e.target.result);
                    reader.readAsDataURL(file);
                });
            }));

            const post = {
                title: document.getElementById('title').value,
                content: document.getElementById('content').value,
                images: images,
                date: new Date().toLocaleDateString()
            };

            const posts = JSON.parse(localStorage.getItem('nafa_blogs')) || [];
            posts.unshift(post);
            localStorage.setItem('nafa_blogs', JSON.stringify(posts));
            alert("Post Published!");
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
