<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAFA Admin | Blog Manager</title>
    <style>
        :root { --gold: #c5a059; --dark: #1a1a1a; --white: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f4f4; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        /* Login Box */
        #login-container { background: var(--white); padding: 40px; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 350px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--dark); color: white; border: none; border-radius: 5px; cursor: pointer; transition: 0.3s; }
        button:hover { background: var(--gold); }

        /* Admin Dashboard (Hidden by default) */
        #admin-dash { display: none; width: 90%; max-width: 800px; background: white; padding: 30px; border-radius: 10px; margin: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .hidden { display: none !important; }
        textarea { width: 100%; height: 200px; padding: 15px; margin-top: 10px; border: 1px solid #ddd; border-radius: 5px; resize: vertical; }
        .preview-img { max-width: 200px; margin-top: 10px; border-radius: 5px; display: block; }
    </style>
</head>
<body>

    <div id="login-container">
        <h2 style="color: var(--dark);">NAFA <span style="color: var(--gold);">Admin</span></h2>
        <input type="text" id="username" placeholder="Admin ID">
        <input type="password" id="password" placeholder="Password">
        <button onclick="checkLogin()">Login to Dashboard</button>
        <p id="error-msg" style="color: red; font-size: 12px; margin-top: 10px;"></p>
    </div>

    <div id="admin-dash">
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--gold); padding-bottom: 10px; margin-bottom: 20px;">
            <h3>Create New Post</h3>
            <button onclick="logout()" style="width: 80px; padding: 5px; background: #ff4444;">Logout</button>
        </div>

        <label>Blog Title</label>
        <input type="text" id="post-title" placeholder="e.g. New 600K Spa Listing in Dubai">

        <label>Upload Cover Image</label>
        <input type="file" id="post-image" accept="image/*" onchange="previewFile()">
        <img src="" id="img-preview" class="preview-img hidden">

        <label>Blog Content</label>
        <textarea id="post-content" placeholder="Write your luxury real estate update here..."></textarea>

        <button onclick="publishPost()" style="margin-top: 20px; background: var(--gold); font-weight: bold;">PUBLISH TO WEBSITE</button>
    </div>

    <script>
        // Simple Auth (Update these for your use!)
        const ADMIN_ID = "nafa_admin";
        const ADMIN_PASS = "Dubai2026";

        function checkLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            
            if(user === ADMIN_ID && pass === ADMIN_PASS) {
                document.getElementById('login-container').classList.add('hidden');
                document.getElementById('admin-dash').style.display = 'block';
            } else {
                document.getElementById('error-msg').innerText = "Invalid Credentials. Try again.";
            }
        }

        function previewFile() {
            const preview = document.getElementById('img-preview');
            const file = document.querySelector('input[type=file]').files[0];
            const reader = new FileReader();

            reader.onloadend = function () {
                preview.src = reader.result;
                preview.classList.remove('hidden');
            }

            if (file) { reader.readAsDataURL(file); }
        }

        function publishPost() {
            const title = document.getElementById('post-title').value;
            const content = document.getElementById('post-content').value;
            const image = document.getElementById('img-preview').src;

            if(!title || !content) { alert("Please fill in the title and content!"); return; }

            const blogPost = { title, content, image, date: new Date().toLocaleDateString() };

            // Save to LocalStorage (This mimics a database for now)
            let posts = JSON.parse(localStorage.getItem('nafa_blogs')) || [];
            posts.unshift(blogPost);
            localStorage.setItem('nafa_blogs', JSON.stringify(posts));

            alert("Blog Posted Successfully!");
            window.location.href = "blogs.html"; // Redirect to see the result
        }

        function logout() { location.reload(); }
    </script>
</body>
</html>
