<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAFA Blog Details</title>
    <style>
        :root { --gold: #c5a059; --dark: #1a1a1a; }
        body { font-family: 'Georgia', serif; margin: 0; background: #fff; line-height: 1.8; color: #222; }
        .nav-bar { padding: 20px; background: var(--dark); }
        .nav-bar a { color: var(--gold); text-decoration: none; font-family: sans-serif; }
        .article-container { max-width: 800px; margin: 40px auto; padding: 0 20px; }
        .title { font-size: 3rem; line-height: 1.2; margin: 20px 0; }
        .content-body img { width: 100%; border-radius: 8px; margin: 20px 0; }
        .mosaic-gallery { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 30px; }
        .mosaic-item img { width: 100%; height: 250px; object-fit: cover; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="nav-bar"><a href="index.html">← BACK TO ALL STORIES</a></div>
    <div class="article-container" id="full-post"></div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        const posts = JSON.parse(localStorage.getItem('nafa_blogs')) || [];
        const post = posts[id];

        if (post) {
            const allImages = post.images || (post.image ? [post.image] : []);
            const mainImg = allImages[0];
            const restImages = allImages.slice(1);

            let mosaicHTML = '';
            if (restImages.length > 0) {
                mosaicHTML = `
                    <h3 style="color:var(--gold); border-bottom:1px solid #eee; padding-bottom:10px;">PROPERTY GALLERY</h3>
                    <div class="mosaic-gallery">
                        ${restImages.map(src => `<div class="mosaic-item"><img src="${src}"></div>`).join('')}
                    </div>`;
            }

            document.getElementById('full-post').innerHTML = `
                <small>Published on ${post.date}</small>
                <h1 class="title">${post.title}</h1>
                <div class="content-body">
                    <img src="${mainImg}">
                    <p style="white-space: pre-wrap;">${post.content}</p>
                </div>
                ${mosaicHTML}
            `;
        }
    </script>
</body>
</html>
