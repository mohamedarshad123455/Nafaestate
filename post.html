<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAFA Blog Details</title>
    <style>
        :root { --gold: #c5a059; --dark: #1a1a1a; }
        body { font-family: 'Georgia', serif; margin: 0; background: #fff; line-height: 1.8; color: #222; }
        
        .nav-bar { padding: 20px; background: var(--dark); position: sticky; top: 0; z-index: 100; }
        .nav-bar a { color: var(--gold); text-decoration: none; font-family: sans-serif; font-size: 0.8rem; letter-spacing: 1px; }

        .article-container { max-width: 1000px; margin: 0 auto; padding: 60px 20px; }
        .meta-data { font-family: sans-serif; text-transform: uppercase; color: var(--gold); letter-spacing: 2px; font-size: 0.8rem; }
        .title { font-size: 3.5rem; line-height: 1.1; margin: 20px 0 40px; color: var(--dark); }
        
        .content-body { font-size: 1.25rem; color: #444; white-space: pre-wrap; margin-bottom: 50px; }

        /* Blog Image Styling */
        .blog-inline-img { 
            width: 100%; 
            border-radius: 8px; 
            margin: 30px 0; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
            display: block;
        }

        .cta-box { margin-top: 80px; padding: 40px; background: var(--dark); color: white; border-radius: 8px; text-align: center; }
        .cta-btn { display: inline-block; padding: 15px 30px; background: var(--gold); color: white; text-decoration: none; margin-top: 20px; border-radius: 4px; font-family: sans-serif; }
    </style>
</head>
<body>

    <div class="nav-bar">
        <a href="index.html">← BACK TO ALL STORIES</a>
    </div>

    <div class="article-container" id="full-post">
        </div>

    <script>
        // 1. Get the post ID from the URL
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        
        // 2. Load all posts from localStorage
        const posts = JSON.parse(localStorage.getItem('nafa_blogs')) || [];
        const post = posts[id];

        if (post) {
            let finalContent = post.content;
            
            // 3. Handle image data (supports both array and single image formats)
            const imagesArray = post.images || (post.image ? [post.image] : []);

            // 4. Loop through images and replace placeholders or append them
            imagesArray.forEach((imgSrc, index) => {
                const placeholder = `[img${index + 1}]`;
                const imgHtml = `<img src="${imgSrc}" class="blog-inline-img" alt="Property Image ${index + 1}">`;
                
                if (finalContent.includes(placeholder)) {
                    // Place image exactly where you typed the placeholder in Admin
                    finalContent = finalContent.replace(placeholder, imgHtml);
                } else if (index === 0) {
                    // Default: Put the first image at the very top if no placeholder is used
                    finalContent = imgHtml + finalContent;
                } else {
                    // Default: Put any extra images at the bottom
                    finalContent += imgHtml;
                }
            });

            // 5. Inject the final built content into the page
            document.getElementById('full-post').innerHTML = `
                <span class="meta-data">Published on ${post.date}</span>
                <h1 class="title">${post.title}</h1>
                <div class="content-body">${finalContent}</div>
                
                <div class="cta-box">
                    <h3>Interested in this property?</h3>
                    <p>Speak with a NAFA expert today.</p>
                    <a href="mailto:info@nafaestate.com" class="cta-btn">CONTACT US</a>
                </div>
            `;
            
            document.title = post.title + " | NAFA Real Estate";
        } else {
            // Error handling if ID is wrong
            document.getElementById('full-post').innerHTML = `
                <h1 class="title">Post Not Found</h1>
                <p>The article you are looking for does not exist or has been moved.</p>
            `;
        }
    </script>
</body>
</html>
